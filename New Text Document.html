                if (isPlayingAudio) {

                if (percentage >= 85) return { text: "ممتاز - يفوق التوقعات دائماً", color: "text-emerald-600 bg-emerald-50 border-emerald-200" };
                if (percentage >= 65) return { text: "جيد جداً - يلبي التوقعات كاملة", color: "text-blue-600 bg-blue-50 border-blue-200" };
                if (percentage >= 50) return { text: "مقبول - يلبي التوقعات بحدها الأدنى", color: "text-amber-600 bg-amber-50 border-amber-200" };
                return { text: "بحاجة إلى دعم مكثف ومساندة", color: "text-rose-600 bg-rose-50 border-rose-200" };
            };

            return (
                <div className="container mx-auto p-4 max-w-4xl">
                    {/* طباعة التقرير الرسمي */}
                    <div className="hidden print-block w-full text-center border-b-2 border-slate-900 pb-4 mb-6">
                        <h2 className="text-xl font-bold">إدارة العمرانية التعليمية - بيان درجات تفاعلي</h2>
                        <p className="mt-2">اسم الطالب: {studentName} | {activeExam?.title}</p>
                    </div>

                    {!isStarted ? (
                        <div className="bg-white rounded-2xl shadow-md p-6 md:p-8 space-y-6">
                            <div className="text-center">
                                <h2 className="text-xl md:text-2xl font-black text-blue-900">كراسة امتحانات اللغة العربية التفاعلية</h2>
                                <p className="text-slate-500 text-xs mt-1">الصف الثاني الإعدادي - الفصل الدراسي الثاني</p>
                            </div>

                            <form onSubmit={handleStartExam} className="space-y-6">
                                <div className="space-y-1">
                                    <label className="text-sm font-bold text-slate-700 block">اسم الطالب رباعياً:</label>
                                    <input 
                                        type="text" required placeholder="اكتب اسمك هنا..." value={studentName}
                                        onChange={(e) => setStudentName(e.target.value)}
                                        className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-blue-500/20 focus:outline-none"
                                    />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-700 block">اختر نموذج الامتحان:</label>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                        {Object.keys(EXAM_DATA).map(letter => (
                                            <button 
                                                key={letter} type="button" onClick={() => setSelectedLetter(letter)}
                                                className={`p-4 rounded-xl border-2 text-right transition-all ${selectedLetter === letter ? 'border-blue-600 bg-blue-50/50' : 'border-slate-200 bg-white'}`}
                                            >
                                                <span className="font-bold text-slate-900 block">{EXAM_DATA[letter].title}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-700 block">وضع الأداء الحركي:</label>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <button 
                                            type="button" onClick={() => setMode('exam')}
                                            className={`p-4 rounded-xl border-2 text-right transition-all ${mode === 'exam' ? 'border-indigo-600 bg-indigo-50/50' : 'border-slate-200 bg-white'}`}
                                        >
                                            <span className="font-bold text-slate-900 block">وضع الاختبار والمحاكاة</span>
                                            <span className="text-xs text-slate-500">تظهر النتائج في النهاية فقط</span>
                                        </button>
                                        <button 
                                            type="button" onClick={() => setMode('practice')}
                                            className={`p-4 rounded-xl border-2 text-right transition-all ${mode === 'practice' ? 'border-teal-600 bg-teal-50/50' : 'border-slate-200 bg-white'}`}
                                        >
                                            <span className="font-bold text-slate-900 block">وضع التدريب والتعلم الفوري</span>
                                            <span className="text-xs text-slate-500">تظهر الإجابة الصحيحة فور اختيارها</span>
                                        </button>
                                    </div>
                                </div>

                                <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-all text-sm">
                                    ابدأ الحل والتقييم التفاعلي الآن
                                </button>
                            </form>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {/* لوحة التحكم العلوية المحمولة */}
                            <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex flex-wrap justify-between items-center gap-2 no-print">
                                <div className="text-xs font-bold text-slate-700">الطالب: {studentName} | <span className="text-blue-600">{activeExam.title}</span></div>
                                <button onClick={() => setIsStarted(false)} className="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold rounded-lg transition-all">خروج</button>
                            </div>

                            {/* لوحة عرض النتائج الكلية */}
                            {isSubmitted && (
                                <div className="bg-white rounded-2xl shadow-sm border p-4 md:p-6 space-y-4">
                                    <div className="text-center font-black text-lg text-slate-900">تم رصد وتصحيح ورقتك بنجاح!</div>
                                    <div className="p-4 bg-slate-50 rounded-xl text-center border">
                                        <div className="text-xs text-slate-400 font-bold">الدرجة النهائية المستحقة:</div>
                                        <div className="text-2xl font-black text-slate-900">{scoreResults.studentScore} / {scoreResults.totalPossible}</div>
                                        <div className={`mt-2 p-1.5 text-xs rounded-lg font-bold ${getGradeDescriptor(scoreResults.studentScore, scoreResults.totalPossible).color}`}>
                                            {getGradeDescriptor(scoreResults.studentScore, scoreResults.totalPossible).text}
                                        </div>
                                    </div>
                                    <button onClick={() => window.print()} className="w-full py-2 bg-slate-900 text-white rounded-lg text-xs font-bold no-print">طباعة كشف الدرجات الفوري</button>
                                </div>
                            )}

                            {/* كراسة الفروع النشطة */}
                            <div className="bg-white rounded-2xl shadow-sm p-4 md:p-6 space-y-6">
                                <div className="border-b pb-3 flex justify-between items-center flex-wrap gap-2">
                                    <h3 className="font-black text-md text-slate-900">{activeExam.sections[currentSectionIndex].title}</h3>
                                    {activeExam.sections[currentSectionIndex].id === 'listening' && (
                                        <button onClick={handleToggleAudio} className={`px-3 py-1.5 text-xs font-bold rounded-lg no-print ${isPlayingAudio ? 'bg-rose-100 text-rose-700 animate-pulse' : 'bg-blue-50 text-blue-700'}`}>
                                            {isPlayingAudio ? 'إيقاف الاستماع' : 'تشغيل النص المسموع آلياً'}
                                        </button>
                                    )}
                                </div>

                                {activeExam.sections[currentSectionIndex].passage && (
                                    <div className="bg-slate-50 border-r-4 border-blue-600 p-3 rounded-l-xl text-slate-800 text-sm leading-relaxed text-justify">
                                        {activeExam.sections[currentSectionIndex].passage}
                                    </div>
                                )}

                                <div className="space-y-4">
                                    {activeExam.sections[currentSectionIndex].questions.map((q, idx) => {
                                        const studentAns = answers[q.id];
                                        const showFeedback = mode === 'practice' || isSubmitted;

                                        return (
                                            <div key={q.id} className="p-3 border border-slate-100 rounded-xl space-y-3 bg-white shadow-sm">
                                                <div className="text-sm font-bold text-slate-900 flex justify-between gap-2">
                                                    <span>{idx + 1}- {q.question}</span>
                                                    <span className="text-xs text-slate-400 font-normal shrink-0">[{q.points} د]</span>
                                                </div>

                                                {q.type === 'mcq' && (
                                                    <div className="grid grid-cols-1 gap-2">
                                                        {q.options.map(opt => {
                                                            const isSelected = studentAns === opt;
                                                            let c = "border-slate-200 text-slate-700 bg-white";
                                                            if (isSelected) c = "border-blue-600 bg-blue-50 font-bold";
                                                            if (showFeedback) {
                                                                if (opt === q.correct) c = "border-emerald-500 bg-emerald-50 text-emerald-900 font-bold";
                                                                else if (isSelected) c = "border-rose-300 bg-rose-50 text-rose-900 line-through";
                                                            }
                                                            return (
                                                                <button key={opt} type="button" onClick={() => handleAnswerChange(q.id, opt)} className={`text-right p-2.5 rounded-lg border text-xs transition-all ${c}`}>
                                                                    {opt}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}

                                                {q.type === 'boolean' && (
                                                    <div className="flex gap-2">
                                                        {[true, false].map(bool => {
                                                            const isSelected = studentAns === bool;
                                                            let c = "border-slate-200 bg-white text-slate-700";
                                                            if (isSelected) c = bool ? "border-emerald-600 bg-emerald-50" : "border-rose-600 bg-rose-50";
                                                            if (showFeedback) {
                                                                if (bool === q.correct) c = "border-emerald-500 bg-emerald-50 text-emerald-900 font-bold";
                                                                else if (isSelected) c = "border-rose-300 bg-rose-50 text-rose-900 shadow-sm";
                                                            }
                                                            return (
                                                                <button key={String(bool)} type="button" onClick={() => handleAnswerChange(q.id, bool)} className={`px-4 py-2 rounded-lg border text-xs font-bold transition-all ${c}`}>
                                                                    {bool ? 'صح ( ✓ )' : 'خطأ ( ✗ )'}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}

                                                {q.type === 'essay' && (
                                                    <div className="space-y-2">
                                                        <textarea rows={2} placeholder="اكتب إجابتك اللغوية هنا..." value={studentAns || ''} onChange={(e) => handleAnswerChange(q.id, e.target.value)} className="w-full p-2 rounded-lg border text-xs bg-slate-50/50" />
                                                        {showFeedback && (
                                                            <div className="bg-amber-50 p-2 rounded-lg border border-amber-200 text-xs text-slate-700 leading-relaxed">
                                                                <strong className="text-amber-800">النموذج المعتمد: </strong>{q.modelAnswer}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* أزرار التنقل السفلية المتجاوبة مع الموبايل */}
                                <div className="flex justify-between items-center pt-3 border-t text-xs font-bold no-print">
                                    <button type="button" disabled={currentSectionIndex === 0} onClick={() => setCurrentSectionIndex(p => p - 1)} className="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg disabled:opacity-40">السابق</button>
                                    <span className="text-slate-400">فرع {currentSectionIndex + 1} من {activeExam.sections.length}</span>
                                    {currentSectionIndex < activeExam.sections.length - 1 ? (
                                        <button type="button" onClick={() => setCurrentSectionIndex(p => p + 1)} className="px-3 py-1.5 bg-blue-600 text-white rounded-lg">التالي</button>
                                    ) : (
                                        !isSubmitted && <button type="button" onClick={() => setIsSubmitted(true)} className="px-3 py-1.5 bg-rose-600 text-white rounded-lg">تسليم الورقة</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
